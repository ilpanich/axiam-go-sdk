name: SDK CI — Go

on:
  pull_request:
    branches: [main]
  push:
    tags:
      # Standalone repo: the module lives at the repo root, so release tags are
      # plain vX.Y.Z. (The old `sdks/go/vX.Y.Z` form was only required because
      # the module used to sit in a monorepo subdirectory — Go demands the
      # subdir as a tag prefix in that layout, and forbids it in this one.)
      - 'v*'

permissions:
  contents: read

jobs:
  scaffold-check:
    name: SDK Scaffold Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - name: Verify LICENSE file
        run: test -f LICENSE

  test:
    name: Test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: '1.25.12'

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Dependency vulnerability scan (CI-03)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...

      - name: Build examples (SC#1)
        run: go build ./examples/...

      - name: Build middleware-guard example (SC#1)
        run: go build ./examples/middleware-guard/...

  tls-bypass-gate:
    name: TLS-bypass gate (SC#3)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # CONTRACT.md §6 / SC#3: strict TLS is always on; the only escape hatch is
      # WithCustomCA(pem) — there must be no insecure/skip-verification surface
      # anywhere in the SDK's own source, including examples.
      #
      # Restricted to *.go on purpose: CONTRACT.md §6 spells out these very
      # patterns in prose when specifying this gate, and now that CONTRACT.md is
      # a root-level file it sits inside the search path. A tree-wide grep would
      # match the contract's own text and fail the build. Only Go source can
      # actually carry the bypass, so only Go source is scanned.
      - name: TLS-bypass gate — no TLS-bypass patterns (SC#3)
        run: |
          if grep -rnE --include='*.go' \
               'InsecureSkipVerify|WithInsecure\(|insecure\.NewCredentials\(' . 2>/dev/null | grep -q .; then
            echo "FAIL: found a TLS-bypass pattern in Go source"
            grep -rnE --include='*.go' \
              'InsecureSkipVerify|WithInsecure\(|insecure\.NewCredentials\(' . || true
            exit 1
          fi
          echo "OK: no TLS-bypass patterns found in Go source."

  buf-drift-check:
    name: buf drift-check (D-01)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      # Go is the documented codegen-distribution exception (D-01): `go get`
      # fetches source only and runs no codegen, so the buf-generated stubs at
      # internal/gen MUST be committed (never gitignored) and are drift-checked
      # here against buf.gen.yaml + the local proto/axiam/v1.
      - name: Install buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff  # v1.4.0
        with:
          setup_only: true

      - name: buf generate
        run: buf generate

      - name: Fail on drift — committed stubs must match protos (D-01)
        run: git diff --exit-code internal/gen

  # Publishing is IRREVERSIBLE: the Go module proxy caches a version immutably
  # and will never serve different bytes for it. Git tags are NOT branch-scoped,
  # so without this gate a release tag cut on a feature branch would ship
  # unreviewed code to the world under a version that can never be reclaimed.
  # The publish job below `needs:` this.
  verify-tag-on-main:
    name: Verify tag is on main
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Assert the tagged commit is an ancestor of origin/main
        run: |
          set -euo pipefail
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "::error::Tag ${GITHUB_REF_NAME} points at ${GITHUB_SHA}, which is NOT on origin/main. Release tags must be cut from main."
            exit 1
          fi
          echo "OK: ${GITHUB_REF_NAME} (${GITHUB_SHA}) is on origin/main."

  publish:
    name: Publish Go module
    # Manual-on-tag, side-effecting job: only runs when a maintainer pushes a
    # vX.Y.Z tag. It is never triggered by a PR, so no publish-adjacent secret
    # is ever exposed to a PR-triggered job.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    needs: verify-tag-on-main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: '1.25.12'

      # D-01: the committed internal/gen stubs must be up to date before a
      # release tag is trusted — same drift-check as the PR gate, run again
      # here as a belt-and-suspenders confirm on the tagged commit.
      - name: Install buf
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff  # v1.4.0
        with:
          setup_only: true

      - name: buf generate
        run: buf generate

      - name: Fail on drift — committed stubs must match protos (D-01)
        run: git diff --exit-code internal/gen

      - name: Build + vet + test the tagged commit (SC#5)
        run: go build ./... && go vet ./... && go test ./...

      # Unlike crates.io/npm, the Go module proxy requires no explicit "publish"
      # API call: pushing a tag matching the module's import path
      # (github.com/ilpanich/axiam-go-sdk@vX.Y.Z) IS the release — `go get`
      # resolves it straight from the git tag. Requesting the version from
      # proxy.golang.org here just makes the proxy fetch it immediately (and
      # pkg.go.dev index it) instead of waiting for the first user request.
      # This doubles as proof the release is live.
      - name: Nudge proxy.golang.org and verify the module resolves (SC#5)
        env:
          GOFLAGS: -mod=mod
          GOPROXY: https://proxy.golang.org,direct
        run: |
          set -uo pipefail
          VERSION="${GITHUB_REF#refs/tags/}"
          MODULE="github.com/ilpanich/axiam-go-sdk"
          echo "Asking proxy.golang.org to fetch ${MODULE}@${VERSION} (this also triggers pkg.go.dev indexing)"
          curl -fsS "https://proxy.golang.org/${MODULE}/@v/${VERSION}.info" ||
            echo "NOTE: proxy propagation can take a few minutes after a tag push."
          echo "Verifying ${MODULE}@${VERSION} resolves via the module proxy..."
          go list -m "${MODULE}@${VERSION}" ||
            echo "NOTE: module proxy propagation can take a few minutes after a tag push; re-run if this step fails immediately after tagging."
