name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    name: Go coverage → Coveralls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e  # v7.0.0
        with:
          go-version: '1.25.12'

      # -covermode=atomic (not the default `set`) is required because the SDK's
      # own tests exercise concurrent paths — the race-safe counter is what
      # keeps the profile accurate under `go test -race`-style parallelism.
      # The full test run still compiles and exercises examples/ (SC#1); only
      # the coverage PROFILE is scoped below.
      - name: Test with coverage
        run: go test ./... -coverprofile=coverage.raw.out -covermode=atomic

      # Scope the coverage profile to the shipped library. The examples/*
      # commands are illustrative entrypoints whose main() blocks on
      # ListenAndServe / a live broker connection and cannot be unit-tested;
      # counting them made the metric track demo code rather than the SDK.
      - name: Scope coverage to library packages
        run: grep -v '/examples/' coverage.raw.out > coverage.out

      # Regression gate: fail if library line coverage drops below the floor.
      # Set below the current level so it never false-fails; ratchet upward as
      # coverage rises.
      - name: Enforce coverage floor
        run: |
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/,"",$3); print $3}')
          echo "Library statement coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t+0 >= 93) ? 0 : 1 }' || {
            echo "::error::coverage ${total}% is below the 93% floor"; exit 1;
          }

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.out
          format: golang
