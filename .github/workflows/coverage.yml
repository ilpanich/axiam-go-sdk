name: Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    name: Go coverage → Coveralls
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16  # v6.5.0
        with:
          go-version: '1.25.12'

      # -covermode=atomic (not the default `set`) is required because the SDK's
      # own tests exercise concurrent paths — the race-safe counter is what
      # keeps the profile accurate under `go test -race`-style parallelism.
      - name: Test with coverage
        run: go test ./... -coverprofile=coverage.out -covermode=atomic

      - name: Upload to Coveralls
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e  # v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          file: coverage.out
          format: golang
